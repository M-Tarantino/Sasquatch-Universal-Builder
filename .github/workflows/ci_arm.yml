name: Sasquatch Universal CI (ARM64)

on: [push, pull_request]

jobs:
  build-arm:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { distro: debian_arm64, image: debian:bookworm, pm: apt-get }
          - { distro: alpine_arm64, image: alpine:latest, pm: apk }

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Run Build in ARM Container
        run: |
          docker run --rm --platform linux/arm64 \
          -v ${{ github.workspace }}:/work -w /work ${{ matrix.image }} \
          /bin/sh -c "
            if [ '${{ matrix.pm }}' = 'apt-get' ]; then
              apt-get update -y && apt-get install -y --no-install-recommends python3 git wget curl make gcc g++ patch binutils zlib1g-dev liblzma-dev liblzo2-dev
            elif [ '${{ matrix.pm }}' = 'apk' ]; then
              apk add --no-cache python3 git wget curl make gcc g++ patch binutils-dev zlib-dev xz-dev lzo-dev
            fi && python3 SASQUATCH_UNIVERSAL_BUILDER.py -v
          "
