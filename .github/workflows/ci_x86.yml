name: Sasquatch Universal CI (Standard)

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { distro: debian_bookworm, image: debian:bookworm, pm: apt-get }
          - { distro: ubuntu_24_04, image: ubuntu:24.04, pm: apt-get }
          - { distro: archlinux, image: archlinux:latest, pm: pacman }
          - { distro: fedora_latest, image: fedora:latest, pm: dnf }
          - { distro: alpine_latest, image: alpine:latest, pm: apk }
          - { distro: kali_linux, image: kalilinux/kali-rolling, pm: apt-get }
          - { distro: rockylinux_9, image: rockylinux:9, pm: dnf }
          - { distro: opensuse_tumbleweed, image: opensuse/tumbleweed:latest, pm: zypper }

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          PM="${{ matrix.pm }}"
          if [ "$PM" = "apt-get" ]; then
            apt-get update -y
            apt-get install -y --no-install-recommends python3 git wget curl make gcc g++ patch binutils zlib1g-dev liblzma-dev liblzo2-dev
          elif [ "$PM" = "pacman" ]; then
            pacman -Syu --noconfirm
            pacman -S --noconfirm python git wget curl make gcc zlib xz lzo patch binutils
          elif [ "$PM" = "dnf" ]; then
            dnf install -y --allowerasing python3 git wget curl make gcc gcc-c++ patch binutils zlib-devel xz-devel lzo-devel
          elif [ "$PM" = "apk" ]; then
            apk add --no-cache python3 git wget curl make gcc g++ patch binutils-dev zlib-dev xz-dev lzo-dev
          elif [ "$PM" = "zypper" ]; then
            zypper --non-interactive install --replacefiles python3 git wget curl make gcc gcc-c++ patch binutils zlib-devel xz-devel lzo-devel
          fi

      - name: Run Sasquatch Universal Builder
        run: python3 SASQUATCH_UNIVERSAL_BUILDER.py -v
