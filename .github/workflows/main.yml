name: Sasquatch Universal CI

on: [push, pull_request]

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Debian
          - distro: debian_bookworm
            image: debian:bookworm
            pm: apt-get
            platform: linux/amd64
          # 2. Ubuntu
          - distro: ubuntu_24_04
            image: ubuntu:24.04
            pm: apt-get
            platform: linux/amd64
          # 3. Arch Linux
          - distro: archlinux
            image: archlinux:latest
            pm: pacman
            platform: linux/amd64
          # 4. Fedora
          - distro: fedora_latest
            image: fedora:latest
            pm: dnf
            platform: linux/amd64
          # 5. Alpine
          - distro: alpine_latest
            image: alpine:latest
            pm: apk
            platform: linux/amd64
          # 6. Kali Linux
          - distro: kali_linux
            image: kalilinux/kali-rolling
            pm: apt-get
            platform: linux/amd64
          # 7. Rocky Linux
          - distro: rockylinux_9
            image: rockylinux:9
            pm: dnf
            platform: linux/amd64
          # 8. OpenSUSE Tumbleweed
          - distro: opensuse_tumbleweed
            image: opensuse/tumbleweed:latest
            pm: zypper
            platform: linux/amd64
          # 9. Debian ARM64
          - distro: debian_arm64
            image: debian:bookworm
            pm: apt-get
            platform: linux/arm64
          # 10. Alpine ARM64
          - distro: alpine_arm64
            image: alpine:latest
            pm: apk
            platform: linux/arm64

    container:
      image: ${{ matrix.image }}
      options: --platform ${{ matrix.platform }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: matrix.platform == 'linux/arm64'

      - name: Install System Dependencies
        run: |
          PM="${{ matrix.pm }}"
          if [ "$PM" = "apt-get" ]; then
            apt-get update -y
            apt-get install -y --no-install-recommends python3 git wget curl make gcc g++ patch binutils zlib1g-dev liblzma-dev liblzo2-dev
          elif [ "$PM" = "pacman" ]; then
            pacman -Syu --noconfirm
            pacman -S --noconfirm python git wget curl make gcc zlib xz lzo patch binutils
          elif [ "$PM" = "dnf" ]; then
            dnf install -y python3 git wget curl make gcc gcc-c++ patch binutils zlib-devel xz-devel lzo-devel
          elif [ "$PM" = "apk" ]; then
            apk add --no-cache python3 git wget curl make gcc g++ patch binutils-dev zlib-dev xz-dev lzo-dev
          elif [ "$PM" = "zypper" ]; then
            zypper install -y python3 git wget curl make gcc gcc-c++ patch binutils zlib-devel xz-devel lzo-devel
          fi

      - name: Run Sasquatch Universal Builder
        run: python3 SASQUATCH_UNIVERSAL_BUILDER.py -v
