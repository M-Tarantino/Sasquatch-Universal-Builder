name: Sasquatch Universal CI

on: [push, pull_request]

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            image: debian:latest
            pm: apt-get
          - distro: archlinux
            image: archlinux:latest
            pm: pacman
          - distro: fedora
            image: fedora:latest
            pm: dnf
          - distro: alpine
            image: alpine:latest
            pm: apk

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          if [ "${{ matrix.pm }}" == "apt-get" ]; then
            apt-get update
            apt-get install -y python3 git wget make gcc g++ patch binutils \
              zlib1g-dev liblzma-dev liblzo2-dev
          elif [ "${{ matrix.pm }}" == "pacman" ]; then
            pacman -Syu --noconfirm
            pacman -S --noconfirm python git wget make gcc zlib xz lzo patch binutils
          elif [ "${{ matrix.pm }}" == "dnf" ]; then
            dnf install -y python3 git wget make gcc gcc-c++ zlib-devel xz-devel \
              lzo-devel patch binutils
          elif [ "${{ matrix.pm }}" == "apk" ]; then
            apk add --no-cache python3 git wget make gcc g++ zlib-dev xz-dev \
              lzo-dev patch binutils-dev
          fi

      - name: Run Sasquatch Universal Builder
        run: |
          # The Python script now automatically injects a compat.h file 
          # to resolve missing definitions on musl-based systems.
          python3 SASQUATCH_UNIVERSAL_BUILDER.py
