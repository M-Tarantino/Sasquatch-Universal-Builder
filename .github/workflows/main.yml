
name: Sasquatch Universal CI

on: [push, pull_request]

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
     
 matrix:
  include:
    # 1. Debian (Standard basis for most forensic and analysis environments)
    - distro: debian_bookworm
      image: debian:bookworm
      pm: apt-get
    # 2. Ubuntu (The primary desktop environment for most security researchers)
    - distro: ubuntu_24_04
      image: ubuntu:24.04
      pm: apt-get
    # 3. Arch Linux (Rolling-release; ideal for testing tool compatibility with bleeding-edge compilers)
    - distro: archlinux
      image: archlinux:latest
      pm: pacman
    # 4. Fedora (RPM-based standard; essential for RHEL-compatible firmware workflows)
    - distro: fedora_latest
      image: fedora:latest
      pm: dnf
    # 5. Alpine (Lightweight musl-based; standard for containerized firmware analysis)
    - distro: alpine_latest
      image: alpine:latest
      pm: apk
    # 6. Kali Linux (The industry-standard platform for security auditing)
    - distro: kali_linux
      image: kalilinux/kali-rolling
      pm: apt-get
    # 7. Rocky Linux (Primary substitute for CentOS; critical for RHEL/Enterprise firmware build environments)
    - distro: rockylinux_9
      image: rockylinux:9
      pm: dnf
    # 8. OpenSUSE Tumbleweed (Excellent for testing code portability across diverse C standard libraries)
    - distro: opensuse_tumbleweed
      image: opensuse/tumbleweed:latest
      pm: zypper
    # 9. Debian ARM64 (Critical for firmware analysis, as most embedded devices are ARM-based)
    - distro: debian_arm64
      image: debian:bookworm
      platform: linux/arm64
      pm: apt-get
    # 10. Alpine ARM64 (Essential for simulating IoT device environments with minimal overhead)
    - distro: alpine_arm64
      image: alpine:latest
      platform: linux/arm64
      pm: apk

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          PM="${{ matrix.pm }}"
          if [ "$PM" = "apt-get" ]; then
            apt-get update -y
            apt-get install -y --no-install-recommends python3 git wget curl make gcc g++ patch binutils zlib1g-dev liblzma-dev liblzo2-dev
          elif [ "$PM" = "pacman" ]; then
            pacman -Syu --noconfirm
            pacman -S --noconfirm python git wget curl make gcc zlib xz lzo patch binutils
          elif [ "$PM" = "dnf" ]; then
            dnf install -y python3 git wget curl make gcc gcc-c++ patch binutils zlib-devel xz-devel lzo-devel
          elif [ "$PM" = "apk" ]; then
            apk add --no-cache python3 git wget curl make gcc g++ patch binutils-dev zlib-dev xz-dev lzo-dev
          fi

      - name: Run Sasquatch Universal Builder
        run: python3 SASQUATCH_UNIVERSAL_BUILDER.py -v