name: Sasquatch Universal CI

on: [push, pull_request]

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            image: debian:latest
            pm: apt-get
          - distro: archlinux
            image: archlinux:latest
            pm: pacman
          - distro: fedora
            image: fedora:latest
            pm: dnf
          - distro: alpine
            image: alpine:latest
            pm: apk

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          if [ "${{ matrix.pm }}" == "apt-get" ]; then
            apt-get update && apt-get install -y python3 git wget make gcc g++
          elif [ "${{ matrix.pm }}" == "pacman" ]; then
            pacman -Syu --noconfirm python git wget make gcc
          elif [ "${{ matrix.pm }}" == "dnf" ]; then
            dnf install -y python3 git wget make gcc gcc-c++
          elif [ "${{ matrix.pm }}" == "apk" ]; then
            apk add --no-cache python3 git wget make gcc g++
          fi

      - name: Run Sasquatch Universal Builder
        run: |
          # Alias für sudo, da wir im Container bereits root sind[span_5](start_span)[span_5](end_span)[span_6](start_span)[span_6](end_span)
          alias sudo=''
          
          # Umgebung auf nicht-interaktiv setzen
          export DEBIAN_FRONTEND=noninteractive
          
          # Skript ausführen (Test-Modus)
          # Wir nutzen --help oder einen Dummy-Aufruf, um die Logik zu prüfen[span_7](start_span)[span_7](end_span)
          python3 SASQUATCH_UNIVERSAL_BUILDER.py --help
