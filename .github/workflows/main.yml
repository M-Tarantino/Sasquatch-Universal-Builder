name: Sasquatch Universal CI

on: [push, pull_request]

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            image: debian:latest
            pm: apt-get
          - distro: archlinux
            image: archlinux:latest
            pm: pacman
          - distro: fedora
            image: fedora:latest
            pm: dnf
          - distro: alpine
            image: alpine:latest
            pm: apk

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install basic system dependencies
      - name: Install System Dependencies
        run: |
          if [ "${{ matrix.pm }}" == "apt-get" ]; then
            apt-get update && apt-get install -y python3 git wget make gcc g++
          elif [ "${{ matrix.pm }}" == "pacman" ]; then
            pacman -Syu --noconfirm python git wget make gcc
          elif [ "${{ matrix.pm }}" == "dnf" ]; then
            dnf install -y python3 git wget make gcc gcc-c++
          elif [ "${{ matrix.pm }}" == "apk" ]; then
            apk add --no-cache python3 git wget make gcc g++
          fi

      # Execute the builder
      - name: Run Sasquatch Universal Builder
        run: |
          # Alias sudo to empty string since we are root in the container
          alias sudo=''
          
          # Set non-interactive mode for installers
          export DEBIAN_FRONTEND=noninteractive
          
          # Execute the builder script
          # We check the exit code to ensure the build process succeeds
          python3 SASQUATCH_UNIVERSAL_BUILDER.py || { echo "Build failed!"; exit 1; }
          
