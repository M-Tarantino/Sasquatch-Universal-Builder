name: Sasquatch Universal CI

on: [push, pull_request]

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            image: debian:latest
            pm: apt-get
          - distro: archlinux
            image: archlinux:latest
            pm: pacman
          - distro: fedora
            image: fedora:latest
            pm: dnf
          - distro: alpine
            image: alpine:latest
            pm: apk

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install comprehensive dependencies including dev headers
      - name: Install System Dependencies
        run: |
          if [ "${{ matrix.pm }}" == "apt-get" ]; then
            apt-get update && apt-get install -y python3 git wget make gcc g++ zlib1g-dev liblzma-dev
          elif [ "${{ matrix.pm }}" == "pacman" ]; then
            pacman -Syu --noconfirm python git wget make gcc zlib xz
          elif [ "${{ matrix.pm }}" == "dnf" ]; then
            dnf install -y python3 git wget make gcc gcc-c++ zlib-devel xz-devel
          elif [ "${{ matrix.pm }}" == "apk" ]; then
            apk add --no-cache python3 git wget make gcc g++ zlib-dev xz-dev
          fi

      - name: Run Sasquatch Universal Builder
        run: |
          alias sudo=''
          export DEBIAN_FRONTEND=noninteractive
          
          # Run the builder. If it fails, print the last 50 lines of the build log
          # We force a single-core build first to see if it's a parallel-execution bug
          python3 SASQUATCH_UNIVERSAL_BUILDER.py || (echo "--- BUILD FAILED. INSPECTING BUILD LOG ---" && tail -n 50 sasquatch_rc1_build/make.log 2>/dev/null || echo "No log found")
          
