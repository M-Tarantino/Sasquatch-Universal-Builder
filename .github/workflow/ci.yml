name: Sasquatch Universal Builder CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            image: debian:latest
          - distro: archlinux
            image: archlinux:latest
          - distro: fedora
            image: fedora:latest
          - distro: alpine
            image: alpine:latest

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          if [ "${{ matrix.distro }}" == "debian" ]; then
            apt-get update && apt-get install -y python3 git wget make gcc g++
          elif [ "${{ matrix.distro }}" == "archlinux" ]; then
            pacman -Syu --noconfirm python git wget make gcc
          elif [ "${{ matrix.distro }}" == "fedora" ]; then
            dnf install -y python3 git wget make gcc gcc-c++
          elif [ "${{ matrix.distro }}" == "alpine" ]; then
            apk add --no-cache python3 git wget make gcc g++
          fi

      - name: Run Sasquatch Universal Builder
        run: |
          # Testlauf des Builders
          # Da das Skript selbst die deps installiert, hier nur die Ausführung
          python3 SASQUATCH_UNIVERSAL_BUILDER.py --help
